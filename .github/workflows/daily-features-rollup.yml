name: daily-features-rollup
permissions:
  contents: write
  issues: write

on:
  # Scheduled rollup moved to the Render daily cron lane.
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      DAYS_BACK: "3"      # recompute a short rolling window each run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install asyncpg
      - run: python scripts/rollup_daily_features.py
