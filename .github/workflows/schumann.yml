name: Schumann Extractors
permissions:
  contents: write
  issues: write

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes UTC
  workflow_dispatch:

jobs:
  run-schumann:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    env:
      BACKEND_DIR: backend
      WORKDIR: backend/bots/schumann
      MEDIA_DIR: media
      PYTHON_VERSION: "3.10"
      PREFER: "cumiana,tomsk"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE || secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: ${{ env.BACKEND_DIR }}

      - name: Checkout media repo
        uses: actions/checkout@v4
        with:
          repository: GaiaEyesHQ/gaiaeyes-media
          ref: main
          path: ${{ env.MEDIA_DIR }}
          token: ${{ secrets.GAIAEYES_MEDIA_TOKEN }}
          persist-credentials: true
          clean: true
          sparse-checkout-cone-mode: true
          fetch-depth: 1
          fetch-tags: false
          show-progress: true
          lfs: false
          submodules: false
          set-safe-directory: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.WORKDIR }}
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run extractors and merge
        id: run
        working-directory: ${{ env.WORKDIR }}
        run: |
          set -euo pipefail
          TS="$(date -u +'%Y%m%d_%H%M%SZ')"
          echo "ts=$TS" >> "$GITHUB_OUTPUT"
          mkdir -p runs

          # Tomsk (mark stale if Last-Modified > 6h)
          python tomsk_extractor.py \
            --out runs/tomsk_now.json \
            --overlay runs/tomsk_overlay_full.png \
            --stale-hours 6 \
            --insecure || true

          # Debug: verify Tomsk FULL overlay emitted
          if [ -f runs/tomsk_overlay_full.png ]; then
            echo "[OK] tomsk_overlay_full.png emitted"
            echo "MD5 after tomsk_extractor:"; md5sum runs/tomsk_overlay_full.png || true
          else
            echo "[ERR] tomsk_overlay_full.png was not produced by tomsk_extractor.py"
            ls -lah runs || true
          fi

          # Cumiana (SR-only, fixed now offset = 22 px)
          python cumiana_extractor.py \
            --out runs/cumiana_now.json \
            --overlay runs/cumiana_overlay.png \
            --anchor fixed --fixed-offset-px 22 \
            --prefer auto \
            --insecure || true

          # Debug: verify Cumiana overlay emitted
          if [ -f runs/cumiana_overlay.png ]; then
            echo "[OK] cumiana_overlay.png emitted"
          else
            echo "[ERR] cumiana_overlay.png was not produced by cumiana_extractor.py"
            ls -lah runs || true
          fi

          # Merge (both sources always present)
          python schumann_multi.py \
            --prefer "${PREFER}" \
            --out runs/schumann_now.json \
            --overlay runs/.ignore_overlay.png \
            --insecure || true

          python tomsk_sos70_params_extractor.py \
            --out runs/tomsk_params_values.json \
            --dir runs \
            --save-overlays true \
            --freq-max-hz 40 \
            --verbose || true

          echo "MD5 after params extractor (present files):"
          md5sum runs/tomsk_overlay_full.png runs/tomsk_params_*_overlay.png 2>/dev/null || true

          # Square share-card crops. Non-blocking; raw station images stay as fallback.
          python share_crop.py \
            --image runs/tomsk_overlay_full.png \
            --json runs/tomsk_now.json \
            --out runs/tomsk_share_latest.jpg \
            --right-margin-minutes 90 \
            --size 1080 \
            --quality 86 || echo "WARN: tomsk_share_latest.jpg crop failed"

          python share_crop.py \
            --image runs/cumiana_overlay.png \
            --json runs/cumiana_now.json \
            --out runs/cumiana_share_latest.jpg \
            --right-margin-minutes 90 \
            --size 1080 \
            --quality 86 || echo "WARN: cumiana_share_latest.jpg crop failed"

          # Debug: quick listing after params extractor
          echo "Post-extract listing:"
          ls -lah runs || true

      - name: Stage artifacts into media repo (latest only)
        id: stage_latest
        working-directory: ${{ env.WORKDIR }}
        env:
          MEDIA_DIR: ${{ github.workspace }}/media
        run: |
          set -euo pipefail
          mkdir -p "$MEDIA_DIR/images" "$MEDIA_DIR/data"

          echo "Listing runs/ before copy:"; ls -lah runs || true

          # Track whether we copied or have at least one usable artifact
          have_any=false

          # Images (latest only). If missing, keep existing.
          if [ -f runs/tomsk_overlay.png ]; then
            cp -f runs/tomsk_overlay.png   "$MEDIA_DIR/images/tomsk_latest.png" && have_any=true
          else
            echo "WARN: runs/tomsk_overlay.png not found; keeping existing images/tomsk_latest.png"
          fi

          if [ -f runs/tomsk_overlay_full.png ]; then
            cp -f runs/tomsk_overlay_full.png "$MEDIA_DIR/images/tomsk_full_latest.png" && have_any=true
          else
            echo "WARN: runs/tomsk_overlay_full.png not found; keeping existing images/tomsk_full_latest.png"
          fi

          if [ -f runs/tomsk_share_latest.jpg ]; then
            cp -f runs/tomsk_share_latest.jpg "$MEDIA_DIR/images/tomsk_share_latest.jpg" && have_any=true
          else
            echo "WARN: runs/tomsk_share_latest.jpg not found; keeping existing images/tomsk_share_latest.jpg"
          fi

          if [ -f runs/cumiana_overlay.png ]; then
            cp -f runs/cumiana_overlay.png "$MEDIA_DIR/images/cumiana_latest.png" && have_any=true
          else
            echo "WARN: runs/cumiana_overlay.png not found; keeping existing images/cumiana_latest.png"
          fi

          if [ -f runs/cumiana_share_latest.jpg ]; then
            cp -f runs/cumiana_share_latest.jpg "$MEDIA_DIR/images/cumiana_share_latest.jpg" && have_any=true
          else
            echo "WARN: runs/cumiana_share_latest.jpg not found; keeping existing images/cumiana_share_latest.jpg"
          fi

          # JSONs (latest only). If missing, keep existing.
          if [ -f runs/schumann_now.json ]; then
            cp -f runs/schumann_now.json   "$MEDIA_DIR/data/schumann_latest.json" && have_any=true
          else
            echo "WARN: runs/schumann_now.json not found; keeping existing data/schumann_latest.json"
          fi

          if [ -f runs/tomsk_now.json ]; then
            if cp -f runs/tomsk_now.json "$MEDIA_DIR/data/tomsk_latest.json"; then have_any=true; fi
          else
            echo "WARN: runs/tomsk_now.json not found; keeping existing data/tomsk_latest.json"
          fi

          if [ -f runs/cumiana_now.json ]; then
            if cp -f runs/cumiana_now.json "$MEDIA_DIR/data/cumiana_latest.json"; then have_any=true; fi
          else
            echo "WARN: runs/cumiana_now.json not found; keeping existing data/cumiana_latest.json"
          fi

          # Images (latest overlays)
          for f in tomsk_params_f_overlay.png tomsk_params_a_overlay.png tomsk_params_q_overlay.png; do
            if [ -f "runs/$f" ]; then
              cp -f "runs/$f" "$MEDIA_DIR/images/${f%.png}_latest.png" && have_any=true
            fi
          done

          # Values JSON
          if [ -f runs/tomsk_params_values.json ]; then
            cp -f runs/tomsk_params_values.json "$MEDIA_DIR/data/tomsk_params_values_latest.json" && have_any=true
          fi

          echo "Listing media/ after copy:"; ls -lah "$MEDIA_DIR/images" || true; ls -lah "$MEDIA_DIR/data" || true

          # Final guard: ensure at least one latest artifact exists in media (image or JSON)
          if [ "$have_any" = false ] && \
             [ ! -f "$MEDIA_DIR/images/tomsk_latest.png" ] && \
             [ ! -f "$MEDIA_DIR/images/cumiana_latest.png" ] && \
             [ ! -f "$MEDIA_DIR/data/schumann_latest.json" ] && \
             [ ! -f "$MEDIA_DIR/data/tomsk_latest.json" ] && \
             [ ! -f "$MEDIA_DIR/data/cumiana_latest.json" ]; then
            echo "ERROR: No latest artifacts to publish (neither images nor JSON). Aborting commit to avoid wiping repo."
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Validate Supabase DB credentials
        if: ${{ steps.stage_latest.outputs.ok == 'true' && env.SUPABASE_URL != '' }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_SERVICE_ROLE:-}" ]; then
            echo "ERROR: SUPABASE_URL is set but SUPABASE_SERVICE_ROLE is missing."
            echo "Set secret SUPABASE_SERVICE_ROLE (or SUPABASE_SERVICE_ROLE_KEY) in GitHub Actions secrets."
            exit 1
          fi
          ROLE_CLAIM="$(python - <<'PY'
          import os, json, base64
          tok = (os.getenv("SUPABASE_SERVICE_ROLE") or "").strip()
          role = "invalid"
          parts = tok.split(".")
          if len(parts) >= 2:
              payload = parts[1]
              payload += "=" * (-len(payload) % 4)
              try:
                  obj = json.loads(base64.urlsafe_b64decode(payload.encode("utf-8")).decode("utf-8"))
                  role = str(obj.get("role") or obj.get("user_role") or "unknown")
              except Exception:
                  role = "decode_error"
          print(role)
          PY
          )"
          echo "Supabase key role claim: ${ROLE_CLAIM}"
          if [ "${ROLE_CLAIM}" != "service_role" ]; then
            echo "ERROR: Supabase key role claim is '${ROLE_CLAIM}', expected 'service_role'."
            echo "Use the Service Role key secret, not anon/public key."
            exit 1
          fi

      - name: Remove timestamped media artifacts (keep only *_latest.*)
        if: ${{ steps.stage_latest.outputs.ok == 'true' }}
        working-directory: ${{ env.MEDIA_DIR }}
        run: |
          set -euo pipefail
          echo "Removing timestamped PNG/JSON files; keeping *_latest.* only..."

          # Ensure directories exist
          mkdir -p images data

          # Remove station/merged PNGs with timestamps (do not touch *_latest.png)
          git rm -f images/tomsk_[0-9]*.png 2>/dev/null || true
          git rm -f images/cumiana_[0-9]*.png 2>/dev/null || true
          git rm -f images/schumann_[0-9]*.png 2>/dev/null || true

          # Remove station/merged JSONs with timestamps (do not touch *_latest.json)
          git rm -f data/tomsk_[0-9]*.json 2>/dev/null || true
          git rm -f data/cumiana_[0-9]*.json 2>/dev/null || true
          git rm -f data/schumann_[0-9]*.json 2>/dev/null || true

          echo "After cleanup, media contains:"; ls -lah images || true; ls -lah data || true

      - name: Upload latest Schumann artifacts to Supabase Storage (optional mirror)
        if: ${{ steps.stage_latest.outputs.ok == 'true' && env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE != '' }}
        working-directory: ${{ env.WORKDIR }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SCHUMANN_BUCKET: ${{ vars.SUPABASE_SCHUMANN_BUCKET }}
          MEDIA_DIR: ${{ github.workspace }}/media
        run: |
          set -euo pipefail

          BUCKET="${SUPABASE_SCHUMANN_BUCKET:-space-visuals}"
          BASE="${SUPABASE_URL%/}"

          upload_one() {
            local src="$1"
            local key="$2"
            local ctype="$3"
            if [ ! -f "$src" ]; then
              echo "skip (missing): $src"
              return 0
            fi
            if curl -sS --fail -X POST \
              "${BASE}/storage/v1/object/${BUCKET}/${key}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE}" \
              -H "x-upsert: true" \
              -H "Content-Type: ${ctype}" \
              --data-binary "@${src}" >/dev/null; then
              echo "uploaded: ${key}"
            else
              echo "WARN: upload failed for ${key}; continuing."
            fi
          }

          # Verify bucket is reachable; keep workflow non-blocking if it is not configured.
          if ! curl -sS --fail \
            "${BASE}/storage/v1/bucket/${BUCKET}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE}" >/dev/null; then
            echo "WARN: Supabase bucket '${BUCKET}' is not reachable; skipping storage mirror."
            exit 0
          fi

          upload_one "${MEDIA_DIR}/data/schumann_latest.json"              "schumann/latest/schumann_latest.json" "application/json"
          upload_one "${MEDIA_DIR}/data/tomsk_latest.json"                 "schumann/latest/tomsk_latest.json" "application/json"
          upload_one "${MEDIA_DIR}/data/cumiana_latest.json"               "schumann/latest/cumiana_latest.json" "application/json"
          upload_one "${MEDIA_DIR}/data/tomsk_params_values_latest.json"   "schumann/latest/tomsk_params_values_latest.json" "application/json"

          upload_one "${MEDIA_DIR}/images/tomsk_latest.png"                "schumann/latest/tomsk_latest.png" "image/png"
          upload_one "${MEDIA_DIR}/images/tomsk_full_latest.png"           "schumann/latest/tomsk_full_latest.png" "image/png"
          upload_one "${MEDIA_DIR}/images/tomsk_share_latest.jpg"          "schumann/latest/tomsk_share_latest.jpg" "image/jpeg"
          upload_one "${MEDIA_DIR}/images/cumiana_latest.png"              "schumann/latest/cumiana_latest.png" "image/png"
          upload_one "${MEDIA_DIR}/images/cumiana_share_latest.jpg"        "schumann/latest/cumiana_share_latest.jpg" "image/jpeg"
          upload_one "${MEDIA_DIR}/images/tomsk_params_f_overlay_latest.png" "schumann/latest/tomsk_params_f_overlay_latest.png" "image/png"
          upload_one "${MEDIA_DIR}/images/tomsk_params_a_overlay_latest.png" "schumann/latest/tomsk_params_a_overlay_latest.png" "image/png"
          upload_one "${MEDIA_DIR}/images/tomsk_params_q_overlay_latest.png" "schumann/latest/tomsk_params_q_overlay_latest.png" "image/png"

          upload_one "${MEDIA_DIR}/data/tomsk_latest.json"                 "social/earthscope/latest/tomsk_latest.json" "application/json"
          upload_one "${MEDIA_DIR}/data/cumiana_latest.json"               "social/earthscope/latest/cumiana_latest.json" "application/json"
          upload_one "${MEDIA_DIR}/images/tomsk_share_latest.jpg"          "social/earthscope/latest/tomsk_share_latest.jpg" "image/jpeg"
          upload_one "${MEDIA_DIR}/images/cumiana_share_latest.jpg"        "social/earthscope/latest/cumiana_share_latest.jpg" "image/jpeg"
          upload_one "${MEDIA_DIR}/images/tomsk_latest.png"                "social/earthscope/latest/tomsk_latest.png" "image/png"
          upload_one "${MEDIA_DIR}/images/cumiana_latest.png"              "social/earthscope/latest/cumiana_latest.png" "image/png"

      - name: "Preflight: verify media remote auth"
        if: ${{ steps.stage_latest.outputs.ok == 'true' }}
        working-directory: ${{ env.MEDIA_DIR }}
        run: |
          set -euo pipefail
          echo "Remote URL:"
          git remote -v
          echo "Testing auth with a read-only call..."
          git ls-remote --heads origin >/dev/null
          echo "Auth looks good."

      - name: Commit & push to media repo
        if: ${{ steps.stage_latest.outputs.ok == 'true' }}
        working-directory: ${{ env.MEDIA_DIR }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          git fetch origin main || true
          git add -A
          if git diff --cached --quiet; then
            echo "No media changes to commit."
            exit 0
          fi
          ts="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git commit -m "schumann update ${ts} [skip ci]"
          git fetch origin main || true
          git pull --rebase origin main || true
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; rebasing and retrying…"
            git fetch origin main || true
            git pull --rebase origin main || true
            sleep $((RANDOM % 4 + 2))
          done
          echo "ERROR: Could not push after 3 attempts."
          exit 1

      - name: Append harmonics and SOS70 params to ext.schumann (stale rows kept with null value_num)
        if: ${{ steps.stage_latest.outputs.ok == 'true' && env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE != '' }}
        working-directory: ${{ env.WORKDIR }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE || secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          TS_ISO="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          # Determine which source is primary from the merged payload (if present)
          PRIMARY_SOURCE=""
          if [ -f runs/schumann_now.json ]; then
            PRIMARY_SOURCE="$(jq -r '.primary // ""' runs/schumann_now.json)"
          fi
          echo "Primary source: ${PRIMARY_SOURCE:-<none>}"

          build_rows() {
            local SRC_JSON="$1"   # runs/tomsk_now.json or runs/cumiana_now.json
            local STATION="$2"    # 'tomsk' or 'cumiana'
            local TS="$3"
            local PRIMARY="$4"    # e.g. 'cumiana' or 'tomsk'

            local STATUS
            STATUS=$(jq -r '.status // "down"' "$SRC_JSON")

            jq --arg station "$STATION" --arg ts "$TS" --arg status "$STATUS" --arg primary "$PRIMARY" '
              . as $root
              | ($root.harmonics_hz // {}) as $h
              | ($root.amplitude_idx // {}) as $a
              | (
                  ["fundamental_hz","F1","F2","F3","F4","F5"]
                  + (if ($a | type) == "object" and (($a | keys) | length) > 0 then
                        ["sr_total_0_20","band_7_9","band_13_15","band_18_20"]
                     else
                        []
                     end)
                )
              | unique
              | map({
                  station_id: $station,
                  ts_utc: $ts,
                  channel: .,
                  value_num: (
                    if $status != "ok" then null
                    elif . == "fundamental_hz" then ($root.fundamental_hz // null)
                    elif (. | startswith("F")) then ($h[.] // null)
                    # amplitude channels (0..1 intensity proxies)
                    elif (. == "sr_total_0_20") then ($a.sr_total_0_20 // null)
                    elif (. == "band_7_9") then ($a.band_7_9 // null)
                    elif (. == "band_13_15") then ($a.band_13_15 // null)
                    elif (. == "band_18_20") then ($a.band_18_20 // null)
                    else null
                    end
                  ),
                  unit: (
                    if (. == "fundamental_hz" or (. | startswith("F"))) then "Hz" else "idx" end
                  ),
                  meta: {
                    status: $status,
                    overlay_path: ($root.overlay_path // null),
                    primary_source: (if $primary == "" then null else $primary end),
                    is_primary: ( $primary != "" and $station == $primary ),
                    raw: $root
                  }
                })
            ' "$SRC_JSON"
          }

          build_params_rows() {
            local SRC_JSON="$1"   # runs/tomsk_params_values.json
            local STATION="$2"    # 'tomsk'
            local TS="$3"

            if [ ! -f "$SRC_JSON" ]; then
              echo "[]"
              return 0
            fi

            jq --arg station "$STATION" --arg ts "$TS" '
              . as $root
              | ($root.values.F_hz // {}) as $f
              | ($root.values.A_value // {}) as $a
              | ($root.values.Q_value // {}) as $q
              | [
                  {channel:"sos70_F1_hz", value:($f.F1 // null), unit:"Hz",  group:"F"},
                  {channel:"sos70_F2_hz", value:($f.F2 // null), unit:"Hz",  group:"F"},
                  {channel:"sos70_F3_hz", value:($f.F3 // null), unit:"Hz",  group:"F"},
                  {channel:"sos70_F4_hz", value:($f.F4 // null), unit:"Hz",  group:"F"},
                  {channel:"sos70_A1",    value:($a.A1 // null), unit:"idx", group:"A"},
                  {channel:"sos70_A2",    value:($a.A2 // null), unit:"idx", group:"A"},
                  {channel:"sos70_A3",    value:($a.A3 // null), unit:"idx", group:"A"},
                  {channel:"sos70_A4",    value:($a.A4 // null), unit:"idx", group:"A"},
                  {channel:"sos70_Q1",    value:($q.Q1 // null), unit:"idx", group:"Q"},
                  {channel:"sos70_Q2",    value:($q.Q2 // null), unit:"idx", group:"Q"},
                  {channel:"sos70_Q3",    value:($q.Q3 // null), unit:"idx", group:"Q"},
                  {channel:"sos70_Q4",    value:($q.Q4 // null), unit:"idx", group:"Q"}
                ]
              | map({
                  station_id: $station,
                  ts_utc: $ts,
                  channel: .channel,
                  value_num: (
                    if .group == "F" and (($root.debug.F.status // "down") != "ok") then null
                    elif .group == "A" and (($root.debug.A.status // "down") != "ok") then null
                    elif .group == "Q" and (($root.debug.Q.status // "down") != "ok") then null
                    else .value
                    end
                  ),
                  unit: .unit,
                  meta: {
                    source: "tomsk_sos70_params",
                    chart_status: {
                      F: ($root.debug.F.status // null),
                      A: ($root.debug.A.status // null),
                      Q: ($root.debug.Q.status // null)
                    },
                    overlays: ($root.debug.overlays // null),
                    raw_saved_at_utc: ($root.saved_at_utc // null)
                  }
                })
            ' "$SRC_JSON"
          }

          # Build combined rows payload (Tomsk + Cumiana + SOS70 parameter channels)
          jq -s '.[0] + .[1] + .[2]' \
            <(build_rows runs/tomsk_now.json tomsk     "$TS_ISO" "$PRIMARY_SOURCE") \
            <(build_rows runs/cumiana_now.json cumiana "$TS_ISO" "$PRIMARY_SOURCE") \
            <(build_params_rows runs/tomsk_params_values.json tomsk "$TS_ISO") \
            > rows_ext.json

          total_rows="$(jq 'length' rows_ext.json)"
          sos70_rows="$(jq '[.[] | select(.channel | startswith("sos70_"))] | length' rows_ext.json)"
          echo "rows_ext total: ${total_rows}"
          echo "rows_ext sos70: ${sos70_rows}"
          echo "rows_ext channels sample:"
          jq -r '.[].channel' rows_ext.json | sort -u | sed -n '1,40p' || true

          # Insert (append-only) into ext.schumann via REST.
          # Primary path: /rest/v1/schumann with ext schema profile headers.
          # Fallback path: /rest/v1/ext_schumann (legacy public view/table alias).
          if [ "${total_rows}" -gt 0 ]; then
            RESP_FILE="$(mktemp)"
            HTTP_CODE="$(
              curl -sS -o "${RESP_FILE}" -w "%{http_code}" \
                "${SUPABASE_URL}/rest/v1/schumann" \
                -H "apikey: ${SUPABASE_SERVICE_ROLE}" \
                -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE}" \
                -H "Accept-Profile: ext" \
                -H "Content-Profile: ext" \
                -H "Content-Type: application/json" \
                -H "Prefer: resolution=ignore-duplicates" \
                -d @rows_ext.json
            )"
            echo "Supabase insert (ext.schumann via profile) HTTP status: ${HTTP_CODE}"
            if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
              echo "Primary insert failed. Response body:"
              cat "${RESP_FILE}" || true

              # Legacy fallback if API is wired to a public ext_schumann object.
              RESP_FILE2="$(mktemp)"
              HTTP_CODE2="$(
                curl -sS -o "${RESP_FILE2}" -w "%{http_code}" \
                  "${SUPABASE_URL}/rest/v1/ext_schumann" \
                  -H "apikey: ${SUPABASE_SERVICE_ROLE}" \
                  -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE}" \
                  -H "Content-Type: application/json" \
                  -H "Prefer: resolution=ignore-duplicates" \
                  -d @rows_ext.json
              )"
              echo "Supabase insert (legacy ext_schumann) HTTP status: ${HTTP_CODE2}"
              if [ "${HTTP_CODE2}" -lt 200 ] || [ "${HTTP_CODE2}" -ge 300 ]; then
                echo "ERROR: Supabase fallback insert failed. Response body:"
                cat "${RESP_FILE2}" || true
                rm -f "${RESP_FILE}" "${RESP_FILE2}"
                exit 1
              fi
              rm -f "${RESP_FILE2}"
            fi
            rm -f "${RESP_FILE}"
          else
            echo "No rows built (unexpected)."
          fi
