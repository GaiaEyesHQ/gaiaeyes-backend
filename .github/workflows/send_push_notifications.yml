name: send-push-notifications

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      APNS_TEAM_ID: ${{ secrets.APNS_TEAM_ID }}
      APNS_KEY_ID: ${{ secrets.APNS_KEY_ID }}
      APNS_BUNDLE_ID: ${{ secrets.APNS_BUNDLE_ID }}
      APNS_PRIVATE_KEY: ${{ secrets.APNS_PRIVATE_KEY }}
      GAIA_LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send queued push notifications
        run: python -m bots.notifications.send_push_notifications
