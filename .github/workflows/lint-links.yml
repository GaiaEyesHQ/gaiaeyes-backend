name: lint-links
permissions:
  contents: write
  issues: write
on: [push, pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if old owner appears
        run: |
          matches="$(grep -RIn --exclude-dir=.git --exclude-dir=venv --exclude-dir=node_modules --exclude='lint-links.yml' -E "gennwu(\.github\.io|/gaiaeyes-media)?" . || true)"
          disallowed="$(printf '%s\n' "$matches" | grep -vE '^\./gaiaeyes-ios/ios/GaiaExporter/Services/MediaPaths\.swift:|^\./gaiaeyes-ios/\.github/workflows/guard-media-links\.yml:' || true)"
          if [[ -n "$disallowed" ]]; then
            printf '%s\n' "$disallowed"
            echo "::error ::Found old owner references. Replace with GaiaEyesHQ"; exit 1;
          fi
